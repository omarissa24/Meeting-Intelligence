# Alembic config — Postgres + SQLAlchemy 2.0 async.
#
# The DATABASE_URL is read at runtime from `meeting_intelligence.config`
# (see alembic/env.py). Don't set sqlalchemy.url here.

[alembic]
script_location = alembic
prepend_sys_path = src
path_separator = os
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
