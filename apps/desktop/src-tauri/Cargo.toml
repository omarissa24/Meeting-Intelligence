[package]
name = "meeting-intelligence-desktop"
version = "0.0.0"
description = "Meeting Intelligence desktop shell"
authors = ["Meeting Intelligence"]
edition = "2021"
rust-version = "1.77"

[lib]
name = "meeting_intelligence_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1"
