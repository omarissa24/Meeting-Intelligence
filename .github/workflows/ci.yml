name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.5"
          enable-cache: true
      - name: Set Python version
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Ruff
        run: uv run ruff check
      - name: Mypy
        run: uv run mypy src
      - name: Pytest
        run: uv run pytest

  desktop:
    name: Desktop (typecheck + web build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck shared-types
        run: pnpm --filter @meeting-intelligence/shared-types typecheck
      - name: Typecheck desktop
        run: pnpm --filter @meeting-intelligence/desktop typecheck
      - name: Web build (Vite only — Tauri bundle runs in desktop-release.yml)
        run: pnpm --filter @meeting-intelligence/desktop build

  desktop-rust:
    name: Desktop Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # The macOS leg runs on the GA `macos-26` image (Xcode 26.x).
        # apple-metal (transitive, required via screencapturekit) references
        # macOS 26-only Metal symbols (MTLSamplerReductionMode,
        # MTLSamplerDescriptor.reductionMode/.lodBias) that need the macOS 26
        # SDK to COMPILE — apple-metal 0.8.8's `if #available(macOS 26, *)`
        # guard is only a runtime check and doesn't spare the Swift compiler
        # from type-checking the body. macos-latest (macOS 15, Xcode < 26)
        # lacks the symbols and fails; macos-26 compiles cleanly. See #1.
        os: [macos-26, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - name: cargo check
        run: cargo check --locked
      - name: cargo test
        run: cargo test --locked --no-fail-fast
