name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # macOS builds on macos-26 (Xcode 26.x): apple-metal — a required
        # transitive dep via screencapturekit — uses macOS 26-only Metal
        # symbols that don't compile against older SDKs (macos-latest is
        # macOS 15). See #1.
        os: [macos-26, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # Release guards (tag pushes only — workflow_dispatch builds are
      # smoke builds and skip them):
      #   1. The committed tauri.conf.json version must match the tag.
      #      The version in the repo at the tag is the source of truth
      #      (`scripts/release-desktop.sh` writes it); a mismatch means
      #      the tag was cut by hand against the wrong commit.
      #   2. The Tauri updater signing key must exist. Without it,
      #      `createUpdaterArtifacts` produces no .sig files and the
      #      published latest.json would brick the auto-update path.
      - name: Verify tag matches tauri.conf.json version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          HAS_TAURI_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
        run: |
          set -euo pipefail
          conf_version="$(jq -r .version apps/desktop/src-tauri/tauri.conf.json)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$conf_version" != "$tag_version" ]; then
            echo "::error::tauri.conf.json version ($conf_version) != tag ($tag_version). Cut releases with scripts/release-desktop.sh."
            exit 1
          fi
          if [ "$HAS_TAURI_SIGNING_KEY" != "true" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set — updater artifacts would be unsigned and latest.json broken. See docs/release-runbook.md."
            exit 1
          fi

      # Bake the backend URL into the frontend bundle. This MUST be a file
      # on disk (.env.production), NOT an `env:` on the tauri-action step.
      # tauri-action runs the Vite build indirectly, via the tauri CLI's
      # `beforeBuildCommand` (`pnpm build`); that grandchild process does
      # not reliably inherit step-level env vars, so v0.1.0 shipped pointing
      # at http://localhost:8000 despite VITE_BACKEND_URL being set on the
      # action. Vite loads `.env.production` straight from disk during
      # `vite build` (production mode), so this is deterministic. The file
      # is gitignored, so it never collides with a developer's local `.env`.
      # Falls back to the prod Fly backend so an unset repo variable can't
      # silently brick the release. Consumed by apps/desktop/src/lib/config.ts.
      - name: Bake backend URL into the frontend build
        shell: bash
        run: |
          echo "VITE_BACKEND_URL=${{ vars.VITE_BACKEND_URL || 'https://meeting-intelligence-api.fly.dev' }}" > apps/desktop/.env.production
          echo "apps/desktop/.env.production:"
          cat apps/desktop/.env.production

      # Bake the backend URL into the RUST binary too. This is a SEPARATE
      # code path from the frontend: the auth flow URL (auth_start_login ->
      # /auth/authorize, exchange_code -> /auth/callback) is built by Rust's
      # `auth::backend_url()`, which reads `option_env!("BACKEND_URL")` at
      # COMPILE time and falls back to http://localhost:8000. VITE_BACKEND_URL
      # never touches it — v0.1.1 had a correct frontend but still sent login
      # to localhost for exactly this reason. A Cargo `[env]` config is the
      # deterministic, propagation-proof way to feed `option_env!` (verified:
      # it resolves even with no shell env var), mirroring .env.production for
      # the frontend. The file is gitignored so it can't force a developer's
      # local `tauri:dev` onto the prod backend. Keep this value aligned with
      # VITE_BACKEND_URL above (see apps/desktop/src-tauri/src/auth/mod.rs).
      - name: Bake backend URL into the Rust build
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/.cargo
          cat > apps/desktop/src-tauri/.cargo/config.toml <<EOF
          [env]
          BACKEND_URL = "${{ vars.VITE_BACKEND_URL || 'https://meeting-intelligence-api.fly.dev' }}"
          EOF
          echo "apps/desktop/src-tauri/.cargo/config.toml:"
          cat apps/desktop/src-tauri/.cargo/config.toml

      # Guard: build the frontend now and assert the prod URL actually
      # baked in, FAILING the job before tauri-action publishes anything.
      # v0.1.0 shipped a localhost build because nothing verified the bake;
      # this is the regression test. The bundle always contains the
      # localhost fallback *literal* from config.ts, so presence of the
      # prod URL (only inlined when VITE_BACKEND_URL resolves) is the real
      # signal. tauri-action rebuilds the frontend itself; this run is just
      # the assertion (a few seconds of Vite).
      - name: Verify backend URL baked into the frontend
        shell: bash
        run: |
          set -euo pipefail
          url="${{ vars.VITE_BACKEND_URL || 'https://meeting-intelligence-api.fly.dev' }}"
          pnpm --filter @meeting-intelligence/desktop build
          if ! grep -rqF "$url" apps/desktop/dist; then
            echo "::error::Frontend bundle in apps/desktop/dist does not reference $url — the backend URL did not bake in. Refusing to publish a localhost build."
            exit 1
          fi
          echo "OK: frontend bundle references $url"

      # Tauri build. Code-signing secrets are optional — if they aren't
      # set, tauri-action produces unsigned artifacts (deliberate for
      # Windows until an Authenticode cert exists; see the runbook).
      # The macOS-only Apple variables and the Windows-only certificate
      # variables are intentionally referenced; missing ones are ignored
      # by tauri-action.
      - uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "marens ${{ github.ref_name }}"
          # Drafts are the go-live gate: the website download buttons and
          # the backend /updates manifest endpoint both read only the
          # latest *published* release. Publishing the draft ships it.
          releaseDraft: true
          prerelease: false
          # Upload latest.json (per-platform url + .sig signature) to the
          # release so the backend's GET /updates endpoint can serve it
          # (FR-4.07).
          includeUpdaterJson: true

      # Post-build regression guard for the RUST backend URL. The frontend
      # guard above can't see this: option_env!("BACKEND_URL") bakes the
      # prod base into the binary as a plain UTF-8 &str (greppable), whereas
      # the embedded frontend assets are brotli-compressed (not greppable).
      # Its presence proves auth::backend_url() resolved to prod, not the
      # localhost fallback — the check that was missing when v0.1.1 shipped
      # a localhost auth flow. Runs after tauri-action (the draft is created
      # but never published from a failed run), so a regression fails the
      # job before the draft is ever published.
      - name: Verify backend URL baked into the compiled binary
        shell: bash
        run: |
          set -euo pipefail
          url="${{ vars.VITE_BACKEND_URL || 'https://meeting-intelligence-api.fly.dev' }}"
          bin="$(ls apps/desktop/src-tauri/target/release/meeting-intelligence-desktop \
                    apps/desktop/src-tauri/target/release/meeting-intelligence-desktop.exe \
                 2>/dev/null | head -1 || true)"
          if [ -z "$bin" ]; then
            echo "::error::release binary not found under target/release — cannot verify the bake"
            exit 1
          fi
          if ! grep -aqF "$url" "$bin"; then
            echo "::error::compiled binary ($bin) does not contain $url — Rust auth::backend_url() did not bake in (option_env! BACKEND_URL). Refusing to ship a localhost auth flow."
            exit 1
          fi
          echo "OK: compiled binary references $url"
